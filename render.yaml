# Render Blueprint. В Render: New → Blueprint → выбрать репозиторий.
services:
  - type: web
    name: zhiromer
    runtime: python
    plan: free
    buildCommand: pip install --timeout 120 --retries 10 -r requirements.txt
    startCommand: python main.py
    # healthCheckPath не задаём: Render проверит, что процесс слушает порт.
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"        # 3.14 ломает сборку asyncpg
      - key: BOT_TOKEN
        sync: false            # задать вручную в дашборде
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: RUN_MODE
        value: webhook
      # WEBHOOK_URL не задаём: код сам берёт RENDER_EXTERNAL_URL (живой адрес сервиса).
      - key: DATABASE_URL
        fromDatabase:
          name: zhiromer-db
          property: connectionString
      - key: DEFAULT_TIMEZONE
        value: Europe/Moscow
      - key: DEFAULT_DAILY_HOUR
        value: "21"
      - key: DEFAULT_WEEKLY_DOW
        value: "6"
      # --- Монетизация (Telegram Stars) ---
      - key: FREE_DAILY_AI
        value: "5"
      - key: SUBSCRIPTION_PRICE_STARS
        value: "250"
      - key: SUBSCRIPTION_DAYS
        value: "30"
      - key: SUPPORT_CONTACT
        sync: false            # укажи свой контакт поддержки
      - key: ADMIN_IDS
        sync: false            # твой Telegram user_id (для /addpromo)
      - key: TELEGRAM_TEST_ENV
        value: "0"             # в проде всегда 0

databases:
  - name: zhiromer-db
    plan: free
    databaseName: calorie_bot
    user: calorie_bot
