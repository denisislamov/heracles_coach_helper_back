# Render Blueprint. В Render: New → Blueprint → выбрать репозиторий.
services:
  - type: web
    name: zhiromer
    runtime: python
    # plan не задаём специально: Render сохраняет текущий тариф сервиса,
    # его можно менять в дашборде, и синк Blueprint не будет его перезатирать.
    buildCommand: pip install --timeout 120 --retries 10 -r requirements.txt
    startCommand: python main.py
    # healthCheckPath не задаём: Render проверит, что процесс слушает порт.
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"        # 3.14 ломает сборку asyncpg
      - key: BOT_TOKEN
        sync: false            # задать вручную в дашборде
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_MODEL_FREE
        value: gpt-4o-mini      # дешёвая модель для бесплатного тира
      - key: RUN_MODE
        value: webhook
      # WEBHOOK_URL не задаём: код сам берёт RENDER_EXTERNAL_URL (живой адрес сервиса).
      - key: DATABASE_URL
        fromDatabase:
          name: zhiromer-db
          property: connectionString
      - key: DEFAULT_TIMEZONE
        value: Europe/Moscow
      - key: DEFAULT_DAILY_HOUR
        value: "21"
      - key: DEFAULT_WEEKLY_DOW
        value: "6"
      # --- Монетизация (Telegram Stars) ---
      - key: MONETIZATION_ENABLED
        value: "0"             # 0 = выключено (всё бесплатно). 1 — включить оплату.
      - key: FREE_DAILY_AI
        value: "3"             # дефолт; реальное значение берётся из админки (settings)
      - key: FREE_PERIOD_DAYS
        value: "30"            # бесплатный период; меняется в админке
      - key: SUBSCRIPTION_PRICE_STARS
        value: "200"
      - key: SUBSCRIPTION_MACROS_PRICE_STARS
        value: "300"            # тариф Premium+КБЖУ
      - key: MACROS_TIER_ENABLED
        value: "1"              # дефолт; реально управляется из админки
      - key: REFERRAL_ENABLED
        value: "1"
      - key: REFERRAL_REWARD_DAYS
        value: "30"
      - key: REFERRAL_FRIENDS_NEEDED
        value: "1"
      - key: SUBSCRIPTION_DAYS
        value: "30"
      - key: TRIAL_DAYS
        value: "3"             # дней безлимита новым (0 = выкл)
      - key: CREDIT_PACKS
        value: "50:70,200:220" # пакеты «кредитов:звёзд»
      - key: BYOK_ENCRYPTION_KEY
        sync: false            # Fernet-ключ для своих ключей юзеров (пусто = BYOK выкл)
      - key: SUPPORT_CONTACT
        sync: false            # укажи свой контакт поддержки
      - key: ADMIN_IDS
        sync: false            # твой Telegram user_id (для /addpromo, /refund, /stats)
      - key: TELEGRAM_TEST_ENV
        value: "0"             # в проде всегда 0
      - key: CHANNEL_ID
        sync: false            # @username или -100... канала для автопостинга (бот — админ канала)
      - key: OPENAI_IMAGE_MODEL
        value: dall-e-3        # модель генерации картинок для постов

  # --- Веб-админка (отдельный сервис, та же база) ---
  - type: web
    name: zhiromer-admin
    runtime: python
    # plan не задаём: Render сохраняет текущий тариф сервиса.
    rootDir: admin
    buildCommand: pip install --timeout 120 --retries 10 -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: zhiromer-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false            # тот же токен бота (для показа фото/видео)
      - key: OPENAI_API_KEY
        sync: false            # для ИИ-помощника по аналитике
      - key: OPENAI_MODEL_ADMIN
        value: gpt-4o-mini     # дешёвая модель для чата-помощника
      - key: ADMIN_LOGIN
        sync: false            # логин (можно свой email)
      - key: ADMIN_PASSWORD
        sync: false            # пароль (обязательно поменяй)
      - key: SECRET_KEY
        generateValue: true    # секрет сессий — Render сгенерирует сам
      - key: STAR_USD
        value: "0.013"

  # --- Публичный лендинг + новости (отдельный сервис, та же база) ---
  - type: web
    name: zhiromer-site
    runtime: python
    # plan не задаём: Render сохраняет текущий тариф сервиса.
    rootDir: site
    buildCommand: pip install --timeout 120 --retries 10 -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: zhiromer-db
          property: connectionString
      - key: BOT_URL
        value: https://t.me/zhiromer_bot

databases:
  - name: zhiromer-db
    # plan не задаём: Render сохраняет текущий тариф базы (нельзя даунгрейдить).
    databaseName: calorie_bot
    user: calorie_bot
