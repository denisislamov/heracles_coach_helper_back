services:
  - type: web
    name: heracles-admin-server
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SECRETS_MASTER_KEY
        sync: false # set manually: exactly 32 bytes, base64
      - key: SEED_ADMIN_EMAIL
        value: islamov.denis@gmail.com
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATA_FILE
        value: /data/store.json
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
